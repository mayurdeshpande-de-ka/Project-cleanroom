name: Diagnostics
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run Diagnostics on EC2
        uses: appleboy/ssh-action@master
        with:
          host: 13.206.145.98
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Redis booth cache ==="
            redis-cli GET analytics 2>/dev/null | python3 -c "import sys,json; raw=sys.stdin.read().strip(); d=json.loads(raw) if raw else {}; booth=d.get('booth',{}); print('available:',booth.get('available')); print('error:',booth.get('error')); print('states:',booth.get('states')); print('acs_with_data:',booth.get('acs_with_data'))" 2>&1 || echo "redis error"
            echo ""
            echo "=== RDS view check ==="
            source /home/ec2-user/Form20-backlog-tracker/venv/bin/activate && cd /home/ec2-user/Form20-backlog-tracker && python3 - <<'PYEOF'
            import os, sys
            sys.path.insert(0, '/home/ec2-user/Form20-backlog-tracker')
            from dotenv import load_dotenv
            load_dotenv('/home/ec2-user/Form20-backlog-tracker/.env')
            import psycopg2
            db_host = os.environ.get('DB_HOST')
            db_user = os.environ.get('DB_USER')
            db_pass = os.environ.get('DB_PASSWORD')
            db_name = os.environ.get('DB_NAME')
            if not all([db_host, db_user, db_pass, db_name]):
                print('ERROR: Missing RDS env vars')
                sys.exit(1)
            conn = psycopg2.connect(host=db_host, user=db_user, password=db_pass, dbname=db_name, connect_timeout=20)
            cur = conn.cursor()
            cur.execute("SELECT table_name FROM information_schema.views WHERE table_name='booth_metadata_full_view'")
            rows = cur.fetchall()
            print('View exists:', bool(rows))
            if rows:
                cur.execute('SELECT COUNT(*) FROM booth_metadata_full_view')
                print('Row count:', cur.fetchone())
                cur.execute('SELECT state_abb, COUNT(DISTINCT ac_no) FROM booth_metadata_full_view GROUP BY state_abb ORDER BY 2 DESC LIMIT 5')
                print('Sample:', cur.fetchall())
            else:
                cur.execute("SELECT table_name FROM information_schema.views WHERE table_schema='public' ORDER BY table_name")
                print('All views:', [r[0] for r in cur.fetchall()])
            PYEOF
