name: Diagnose Booth
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check booth analytics on EC2
        uses: appleboy/ssh-action@master
        with:
          host: 13.206.145.98
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Checking /api/dashboard/analytics booth key ==="
            curl -s -b "session=$(cat /home/ec2-user/.dev_session_cookie 2>/dev/null)" http://127.0.0.1:5050/api/dashboard/analytics | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('booth',{}), indent=2))" 2>&1 || echo "curl/json error"
            echo ""
            echo "=== Redis cache key ==="
            redis-cli GET analytics | python3 -c "import sys,json; raw=sys.stdin.read().strip(); d=json.loads(raw) if raw else {}; print(json.dumps(d.get('booth',{}), indent=2))" 2>&1 || echo "redis not accessible"
            echo ""
            echo "=== Check if view exists in RDS ==="
            source /home/ec2-user/Form20-backlog-tracker/venv/bin/activate
            python3 -c "
import os,sys
sys.path.insert(0,'/home/ec2-user/Form20-backlog-tracker')
from dotenv import load_dotenv
load_dotenv('/home/ec2-user/Form20-backlog-tracker/.env')
from app import get_rds_db, _rds_query
rds = get_rds_db()
if not rds:
    print('ERROR: No RDS connection')
    sys.exit(1)
cur = rds.cursor()
rows, err = _rds_query(cur, \"SELECT table_name FROM information_schema.views WHERE table_name='booth_metadata_full_view'\")
print('View exists:', rows)
if rows:
    rows2, err2 = _rds_query(cur, 'SELECT COUNT(*) FROM booth_metadata_full_view')
    print('Row count:', rows2, 'err:', err2)
    rows3, err3 = _rds_query(cur, 'SELECT state_abb, COUNT(DISTINCT ac_no), COUNT(*), SUM(total_voters) FROM booth_metadata_full_view GROUP BY state_abb ORDER BY 2 DESC LIMIT 5')
    print('Sample rows:', rows3, 'err:', err3)
else:
    print('View NOT found. Error:', err)
    # List all views
    rows4, _ = _rds_query(cur, \"SELECT table_name FROM information_schema.views ORDER BY table_name\")
    print('All views:', [r[0] for r in (rows4 or [])])
" 2>&1
