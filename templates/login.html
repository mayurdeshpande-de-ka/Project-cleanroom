<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Project Classroom - Secure Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5; /* Matching Dashboard */
      color: #111827;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    
    /* Clean Minimal Card */
    .minimal-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    /* Button Hover Effect */
    .google-btn {
      transition: all 0.2s ease-in-out;
    }
    .google-btn:hover {
      background-color: #f9fafb;
      border-color: #d1d5db;
    }
    .google-btn:active {
      background-color: #f3f4f6;
    }
  </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center relative">

  <!-- Minimal Background Elements (Optional subtle grid) -->
  <div class="absolute inset-0 z-0" style="background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 32px 32px; opacity: 0.5;"></div>

  <!-- Main Login Card -->
  <div class="relative z-10 w-full max-w-[400px] px-6">
    <div class="minimal-card rounded-2xl p-10 text-center">
      
      <!-- Icon/Logo -->
      <div class="mx-auto w-14 h-14 rounded-xl bg-gray-900 flex items-center justify-center mb-6 shadow-sm">
        <span class="material-symbols-outlined text-white" style="font-size: 28px;">school</span>
      </div>

      <!-- Headers -->
      <h1 class="text-2xl font-bold tracking-tight text-gray-900 mb-2">Project Classroom</h1>
      <p class="text-gray-500 text-sm mb-8 leading-relaxed">
        Secure authentication required.<br>Sign in to access the operational grid.
      </p>

      <!-- Google Sign In Button -->
      <a href="/login" class="google-btn flex items-center justify-center gap-3 w-full bg-white border border-gray-200 text-gray-700 font-medium py-3 px-4 rounded-xl shadow-sm group">
        <div class="bg-white p-0.5 rounded-full">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            <path fill="none" d="M1 1h22v22H1z"/>
          </svg>
        </div>
        <span class="tracking-wide">Continue with Google</span>
      </a>

      <!-- Footer text -->
      <div class="mt-8 pt-6 border-t border-gray-100">
        <p class="text-[11px] text-gray-400 font-medium tracking-wide uppercase flex items-center justify-center gap-1">
          <span class="material-symbols-outlined text-[14px]">lock</span>
          Authorized Personnel Only
        </p>
      </div>

    </div>
  </div>

</body>
</html>
